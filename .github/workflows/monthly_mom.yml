name: Monthly MoM Summary

on:
  schedule:
    - cron: "0 3 1 * *"   # 9 AM IST on 1st of every month
  workflow_dispatch:

jobs:
  monthly-report:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Generate Monthly PDF
      run: |
        python3 monthly_summary_pdf.py

    - name: Email Report
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      run: |
        python3 - << 'EOF'
        import smtplib
        from email.mime.multipart import MIMEMultipart
        from email.mime.base import MIMEBase
        from email import encoders
        import os

        sender = os.getenv("EMAIL_USER")
        password = os.getenv("EMAIL_PASS")
        receiver = "praveen.chaudhary@koenig-solutions.com"

        msg = MIMEMultipart()
        msg["From"] = sender
        msg["To"] = receiver
        msg["Subject"] = "Monthly MoM Summary Report"

        filename = "Monthly_MoM_Summary.pdf"
        attachment = open(filename, "rb")

        part = MIMEBase("application", "octet-stream")
        part.set_payload(attachment.read())
        encoders.encode_base64(part)
        part.add_header("Content-Disposition", f"attachment; filename={filename}")

        msg.attach(part)

        s = smtplib.SMTP("smtp.office365.com", 587)
        s.starttls()
        s.login(sender, password)
        s.sendmail(sender, receiver, msg.as_string())
        s.quit()
        EOF
